apiVersion: v1
kind: Namespace
metadata:
  name: fundi-marketplace
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fundi-postgres
  namespace: fundi-marketplace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fundi-postgres
  template:
    metadata:
      labels:
        app: fundi-postgres
    spec:
      containers:
      - name: postgres
        image: postgis/postgis:15-3.3
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres"
        - name: POSTGRES_DB
          value: "fundi_db"
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: fundi-db-service
  namespace: fundi-marketplace
spec:
  ports:
  - port: 5432
  selector:
    app: fundi-postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fundi-backend
  namespace: fundi-marketplace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fundi-backend
  template:
    metadata:
      labels:
        app: fundi-backend
    spec:
      containers:
      - name: backend
        image: fundiservicetz/backend:latest
        env:
        - name: DB_HOST
          value: "fundi-db-service"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "postgres"
        - name: DB_NAME
          value: "fundi_db"
        - name: JWT_SECRET
          value: "k8s_super_secure_secret_key"
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: fundi-backend-service
  namespace: fundi-marketplace
spec:
  ports:
  - port: 5000
  selector:
    app: fundi-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fundi-frontend
  namespace: fundi-marketplace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fundi-frontend
  template:
    metadata:
      labels:
        app: fundi-frontend
    spec:
      containers:
      - name: frontend
        image: fundiservicetz/frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: fundi-frontend-service
  namespace: fundi-marketplace
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: fundi-frontend

apiVersion: v1
kind: Namespace
metadata:
  name: fundi-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fundi-config
  namespace: fundi-system
data:
  NODE_ENV: "production"
  PORT: "5000"
  ALLOWED_ORIGINS: "https://fundiservice.co.tz"
---
apiVersion: v1
kind: Secret
metadata:
  name: fundi-secrets
  namespace: fundi-system
type: Opaque
data:
  DATABASE_URL: cG9zdGdyZXNxbDovL3Bvc3RncmVzOnBvc3RncmVzX3NlY3VyZV9wYXNzd29yZEBwb3N0Z3Jlcy1zZXJ2aWNlOjU0MzIvZnVuZGlfc2VydmljZV9kYj9zY2hlbWE9cHVibGlj # postgresql://postgres:postgres_secure_password@postgres-service:5432/fundi_service_db?schema=public base64 encoded
  JWT_SECRET: c3VwZXJfc2VjcmV0X2p3dF9zaWdua2V5XzIwMjZfdGFuemFuaWE= # super_secret_jwt_signkey_2026_tanzania base64 encoded
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: fundi-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: fundi-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres_secure_password"
            - name: POSTGRES_DB
              value: "fundi_service_db"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: fundi-system
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: fundi-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: fundiservice/backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: fundi-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fundi-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fundi-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: fundi-system
spec:
  ports:
    - port: 80
      targetPort: 5000
  selector:
    app: backend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fundi-ingress
  namespace: fundi-system
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
    - host: api.fundiservice.co.tz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: fundi-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75

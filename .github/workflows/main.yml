name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run Prisma Validate
        run: |
          cd backend
          npx prisma validate

      - name: Build TypeScript
        run: |
          cd backend
          npm run build

      - name: Build Docker Image
        run: |
          cd backend
          docker build -t fundiservice/backend:latest .

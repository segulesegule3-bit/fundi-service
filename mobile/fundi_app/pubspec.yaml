name: fundi_app
description: "Fundi Mobile Application for Fundi Service Tanzania"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Routing & Navigation
  go_router: ^13.2.0

  # Networking & HTTP Client
  dio: ^5.4.1

  # Local Cache Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Security & Encrypted Storage
  flutter_secure_storage: ^9.0.0

  # Mapping, Routing & Geolocation
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0

  # Firebase Cloud Messaging & Push Notifications
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19

  # Real-Time Websockets
  socket_io_client: ^2.0.3+1

  # Image Picker & Devices Media
  image_picker: ^1.0.7
  camera: ^0.10.5+9

  # Utilities & Design Assets
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
